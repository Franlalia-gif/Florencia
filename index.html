<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Florencia</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      background-color: rgba(108, 52, 206, 0.25);
      background-image: url("./IMG_1585.png");
      background-repeat: repeat;

      font-family: Helvetica, Arial, sans-serif;
    }

    h1 {
      margin-bottom: 20px;
    }

    .flor-texto {
      color: #f4f5f1;
      font-size: 24px;
      margin: 10px 0;
    }

    .flor-principal {
      max-width: 90%;
      max-height: 80vh;
      object-fit: contain;
    }

    .contador {
      margin-top: 30px;
      margin-bottom: 20px;
      text-align: center;
    }

    .contador p {
      margin-bottom: 8px;
    }

    .contador img {
      max-width: 100%;
    }
  </style>
</head>

<body>
  <h1>Florencia</h1>

  <p class="flor-texto">
    Mi gata hermosa llamada Flor
  </p>

  <img
    class="flor-principal"
    src="./Flor Body.jpeg"
    alt="Flor"
  >

  <div class="contador">
    <p>Visitas:</p>

    <img
      src="https://hits.donaldzou.dev/api/hit?url=https://Franlalia-gif.github.io/Florencia/"
      alt="Contador de visitas"
    >
  </div>
</body>
</html>
