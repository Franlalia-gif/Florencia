<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Florencia</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      background-color: rgba(108, 52, 206, 0.25);
      background-image: url("./IMG_1585.png");
      background-repeat: repeat;

      font-family: Helvetica, Arial, sans-serif;
    }

    h1 {
      margin-bottom: 20px;
    }

    .flor-texto {
      color: #f4f5f1;
      font-size: 24px;
      margin: 10px 0;
      text-align: center;
    }

    .flor-principal {
      display: block;
      width: auto;
      height: auto;
      max-width: 90%;
      max-height: 80vh;
      object-fit: contain;
    }

    .contador {
      margin-top: 30px;
      margin-bottom: 20px;
      text-align: center;
    }

    .contador p {
      margin: 0 0 8px 0;
    }

    .contador img {
      display: block;
      margin: 0 auto;
      max-width: none;
      max-height: none;
    }
  </style>
</head>

<body>
  <h1>Florencia</h1>

  <p class="flor-texto">
    Mi gata hermosa llamada Flor
  </p>

  <img
    class="flor-principal"
    src="./Flor Body.jpeg"
    alt="Flor"
  >

  <div class="contador">
    <p>Visitas:</p>

    <img
      src="https://hitscounter.dev/api/hit?url=https%3A%2F%2FFranlalia-gif.github.io%2FFlorencia%2F&label=Visitas&icon=github&color=%236c34ce"
      alt="Contador de visitas"
    >
  </div>
</body>
</html>
